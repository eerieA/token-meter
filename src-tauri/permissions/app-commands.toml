# This file defines permissions for custom application commands.

[[permission]]
identifier = "app-commands"
description = "Allows invoking Token Meter custom backend commands"

[permission.commands]
allow = [
  "get_api_key",
  "get_cached_data",
  "validate_api_key",
  "fetch_month_to_date",
  "save_api_key_command",
  "save_baseline_command",
  "clear_baseline_command",
  "get_anthropic_api_key",
  "save_anthropic_api_key_command",
  "validate_anthropic_api_key",
  "fetch_anthropic_month_to_date",
  "save_anthropic_baseline_command",
  "clear_anthropic_baseline_command",
  "set_baseline_provider",
  "get_baseline_provider",
  "close_window",
  "show_context_menu",
  "hide_context_menu",
  "quit_app",
  "show_baseline_modal",
  "hide_baseline_modal"
]
deny = []
