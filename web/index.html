<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Meter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .widget {
            background: rgba(233, 233, 233, 0.5);
            border-radius: 1px;
            border: 2px solid rgba(236, 241, 241, 0.9);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-sizing: border-box;
            -webkit-app-region: no-drag;
        }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(200, 200, 200, 0.8);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            min-width: 120px;
            font-size: 12px;
            -webkit-app-region: no-drag;
        }

        .context-menu-item {
            padding: 6px 12px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            font-size: 12px;
            color: #333;
        }

        .context-menu-item:hover {
            background: rgba(100, 100, 100, 0.1);
        }

        .context-menu-item:first-child {
            border-radius: 4px 4px 0 0;
        }

        .context-menu-item:last-child {
            border-radius: 0 0 4px 4px;
        }

        #normal-display {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 20px;
            margin-bottom: 4px;
        }

        /* Provider toggle pills */
        .provider-toggle {
            display: flex;
            gap: 3px;
        }

        .provider-btn {
            padding: 1px 5px;
            font-size: 10px;
            border: 1px solid rgba(115, 121, 120, 0.5);
            border-radius: 3px;
            background: transparent;
            color: rgba(80, 80, 80, 0.7);
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        .provider-btn.active {
            background: rgb(115, 121, 120);
            color: white;
            border-color: rgb(115, 121, 120);
        }

        .drag-handle {
            width: 16px;
            height: 16px;
            cursor: grab;
            -webkit-app-region: drag;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .cost {
            font-size: 30px;
            color: #80d755;
            margin-bottom: 4px;
            font-weight: bold;
            text-shadow: -1px 1px 2px rgba(140, 149, 148, 0.8);
        }

        .status {
            font-size: 12px;
            line-height: 14px;
            color: rgba(236, 241, 241, 0.8);
            text-shadow: -1px 1px 1px rgba(115, 121, 120, 0.8);
            width: 100%;
            padding: 0px 2px 0px 2px;
            border-radius: 2px;
            border: 1px solid rgba(236, 241, 241, 0.5);
            background-color: rgba(115, 121, 120, 1.0);
            min-height: 28px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            text-overflow: ellipsis;
            white-space: normal;
        }

        .refresh-button {
            background: rgb(115, 121, 120);
            color: white;
            border: none;
            padding: 0px 2px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            align-self: flex-end;
            -webkit-app-region: no-drag;
        }

        .refresh-button:hover {
            background: rgb(100, 100, 100);
        }

        .refresh-button:active {
            background: rgb(100, 100, 100);
        }

        /* Add key inline panel */
        #add-key-container {
            display: none;
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
        }

        .setup-input {
            width: 100%;
            padding: 4px;
            border: 1px solid rgb(189, 201, 200);
            border-radius: 2px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
            -webkit-app-region: no-drag;
        }

        .setup-button {
            background: rgb(80, 80, 80);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            align-self: center;
            -webkit-app-region: no-drag;
        }

        .setup-button:hover {
            background: rgb(100, 100, 100);
        }

        .setup-button:disabled {
            background: rgb(150, 150, 150);
            cursor: not-allowed;
        }

        .setup-error {
            font-size: 11px;
            color: rgb(200, 50, 50);
            text-align: center;
        }

        .setup-success {
            font-size: 11px;
            color: rgb(50, 200, 50);
            text-align: center;
        }

        /* Baseline modal backdrop and panel */
        #baseline-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #baseline-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            z-index: 1;
        }

        #baseline-modal-panel {
            position: relative;
            z-index: 2;
            width: min(85%, 180px);
            max-width: 90vw;
            height: 90%;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
            -webkit-app-region: no-drag;
        }
    </style>
</head>

<body>
    <div class="widget">
        <div class="content">
            <!-- Normal Display -->
            <div id="normal-display">
                <!-- Header: provider toggle + drag handle -->
                <div class="header">
                    <div class="provider-toggle">
                        <button class="provider-btn active" id="btn-openai">OAI</button>
                        <button class="provider-btn" id="btn-anthropic">ANT</button>
                    </div>
                    <div class="drag-handle">⋮⋮</div>
                </div>

                <div style="display:flex; flex-direction: column; justify-content:space-between; align-items:center; gap:8px;">
                    <div class="cost" id="cost">MTD: $--:--</div>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <button class="refresh-button" id="refresh-btn">Refresh</button>
                        <button class="refresh-button" id="baseline-toggle-btn">Baseline</button>
                    </div>
                    <div class="status" id="status">Status: Ready</div>
                </div>

                <!-- Add key inline panel (shown when active provider has no key) -->
                <div id="add-key-container">
                    <form id="api-key-form" onsubmit="return false;">
                        <input type="text" name="username" autocomplete="username" style="display: none;">
                        <input type="password" class="setup-input" id="api-key-input" placeholder="Enter API Key"
                            autocomplete="new-password">
                        <button type="submit" class="setup-button" id="save-api-btn">Save & Validate</button>
                    </form>
                    <div class="setup-error" id="setup-error" style="display: none;"></div>
                    <div class="setup-success" id="setup-success" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Baseline Modal (in-DOM fallback) -->
    <div id="baseline-modal" style="display:none;" aria-hidden="true">
        <div id="baseline-modal-backdrop"></div>
        <div id="baseline-modal-panel" role="dialog" aria-modal="true" aria-labelledby="baseline-modal-title">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <div id="baseline-modal-title" style="font-weight:600;">Set Baseline Credit</div>
                <button id="baseline-modal-close"
                    style="background:transparent;border:none;font-size:16px;cursor:pointer;">✕</button>
            </div>
            <div style="display:flex; flex-direction:column; gap:6px;">
                <input type="number" id="modal-baseline-amount" class="setup-input"
                    placeholder="Baseline amount (e.g. 5.10)" step="0.01" min="0">
                <input type="date" id="modal-baseline-date" class="setup-input">
                <div style="display:flex; gap:6px;">
                    <button class="setup-button" id="modal-save-baseline-btn">Save</button>
                    <button class="setup-button" id="modal-clear-baseline-btn">Clear</button>
                </div>
                <div class="setup-error" id="modal-baseline-error" style="display:none"></div>
                <div class="setup-success" id="modal-baseline-success" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- Default/fallback context menu -->
    <div id="context-menu" class="context-menu">
        <button class="context-menu-item" id="close-app">Quit app</button>
        <button class="context-menu-item" id="cancel-menu">Cancel</button>
    </div>

    <script type="module">
        import { forceMousemoveRepaint, forceElementMousemove, forcePointerRepaint,
            forceCssRepaint, toggleWindowOpacityRepaint, forceFullWindowPaintNudge
         } from './ui/contextMenu.js';
        window.forceMousemoveRepaint = forceMousemoveRepaint;
        window.forceElementMousemove = forceElementMousemove;
        window.forcePointerRepaint = forcePointerRepaint;
        window.forceCssRepaint = forceCssRepaint;
        window.toggleWindowOpacityRepaint = toggleWindowOpacityRepaint;
        window.forceFullWindowPaintNudge = forceFullWindowPaintNudge;

        const invoke = (window.__TAURI__?.core && typeof window.__TAURI__.core.invoke === 'function')
            ? window.__TAURI__.core.invoke
            : (window.__TAURI__?.tauri && typeof window.__TAURI__.tauri.invoke === 'function')
              ? window.__TAURI__.tauri.invoke
              : (typeof window.__TAURI__?.invoke === 'function')
                ? window.__TAURI__.invoke
                : null;
        const appWindow = window.__TAURI__?.window?.getCurrentWindow
            ? window.__TAURI__.window.getCurrentWindow()
            : null;

        // ── Elements (declared first so helpers can reference them) ─────────
        const widget = document.querySelector('.widget');

        // ── State ────────────────────────────────────────────────────────────
        let activeProvider = 'openai'; // 'openai' | 'anthropic'
        let currentCost = null;
        let currentStatus = 'Loading...';
        let autoRefreshInterval = null;

        // ── Elements ─────────────────────────────────────────────────────────
        const costEl = document.getElementById('cost');
        const statusEl = document.getElementById('status');
        const refreshBtn = document.getElementById('refresh-btn');
        const baselineToggleBtn = document.getElementById('baseline-toggle-btn');
        const baselineModal = document.getElementById('baseline-modal');
        const modalBackdrop = document.getElementById('baseline-modal-backdrop');
        const modalCloseBtn = document.getElementById('baseline-modal-close');
        const modalAmountInput = document.getElementById('modal-baseline-amount');
        const modalDateInput = document.getElementById('modal-baseline-date');
        const modalSaveBtn = document.getElementById('modal-save-baseline-btn');
        const modalClearBtn = document.getElementById('modal-clear-baseline-btn');
        const modalError = document.getElementById('modal-baseline-error');
        const modalSuccess = document.getElementById('modal-baseline-success');
        const addKeyContainer = document.getElementById('add-key-container');
        const apiKeyForm = document.getElementById('api-key-form');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveApiBtn = document.getElementById('save-api-btn');
        const setupError = document.getElementById('setup-error');
        const setupSuccess = document.getElementById('setup-success');
        const btnOpenAI = document.getElementById('btn-openai');
        const btnAnthropic = document.getElementById('btn-anthropic');
        const contextMenu = document.getElementById('context-menu');
        const closeAppBtn = document.getElementById('close-app');
        const cancelMenuBtn = document.getElementById('cancel-menu');
        const baselineModalParent = baselineModal.parentElement;

        // ── Provider toggle ───────────────────────────────────────────────────
        function setActiveProvider(p) {
            activeProvider = p;
            btnOpenAI.classList.toggle('active', p === 'openai');
            btnAnthropic.classList.toggle('active', p === 'anthropic');
            currentCost = null;
            hideAddKeyPanel();
            // Update display immediately so the prefix reflects the new provider
            updateUI(null, 'Switching...');
            loadProvider().catch(e => {
                console.error('loadProvider error:', e);
                updateUI(null, 'Error: ' + e);
            });
        }

        btnOpenAI.addEventListener('click', () => setActiveProvider('openai'));
        btnAnthropic.addEventListener('click', () => setActiveProvider('anthropic'));

        // ── Key helpers ───────────────────────────────────────────────────────
        async function getActiveKey() {
            return activeProvider === 'openai'
                ? invoke('get_api_key')
                : invoke('get_anthropic_api_key');
        }

        async function saveActiveKey(key) {
            return activeProvider === 'openai'
                ? invoke('save_api_key_command', { apiKey: key })
                : invoke('save_anthropic_api_key_command', { apiKey: key });
        }

        async function validateActiveKey(key) {
            return activeProvider === 'openai'
                ? invoke('validate_api_key', { apiKey: key })
                : invoke('validate_anthropic_api_key', { apiKey: key });
        }

        async function fetchActiveProvider(key) {
            return activeProvider === 'openai'
                ? invoke('fetch_month_to_date', { apiKey: key })
                : invoke('fetch_anthropic_month_to_date', { apiKey: key });
        }

        function getCachedForProvider(cachedData) {
            if (!cachedData) return null;
            return activeProvider === 'openai' ? cachedData.openai : cachedData.anthropic;
        }

        // ── Add-key panel ─────────────────────────────────────────────────────
        function showAddKeyPanel() {
            addKeyContainer.style.display = 'flex';
            apiKeyInput.value = '';
            apiKeyInput.placeholder = activeProvider === 'openai' ? 'Enter OpenAI API Key' : 'Enter Anthropic Admin Key';
            setupError.style.display = 'none';
            setupSuccess.style.display = 'none';
            apiKeyInput.focus();
        }

        function hideAddKeyPanel() {
            addKeyContainer.style.display = 'none';
            setupError.style.display = 'none';
            setupSuccess.style.display = 'none';
        }

        async function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if (!key) { showKeyError('Please enter an API key'); return; }
            saveApiBtn.disabled = true;
            saveApiBtn.textContent = 'Validating...';
            try {
                const validation = await validateActiveKey(key);
                if (validation.success) {
                    await saveActiveKey(key);
                    setupSuccess.textContent = 'Saved!';
                    setupSuccess.style.display = 'block';
                    setupError.style.display = 'none';
                    setTimeout(async () => {
                        hideAddKeyPanel();
                        await loadProvider();
                        startAutoRefresh();
                    }, 800);
                } else {
                    showKeyError('Invalid key: ' + validation.error);
                }
            } catch (e) {
                showKeyError('Error: ' + e);
            } finally {
                saveApiBtn.disabled = false;
                saveApiBtn.textContent = 'Save & Validate';
            }
        }

        function showKeyError(msg) {
            setupError.textContent = msg;
            setupError.style.display = 'block';
            setupSuccess.style.display = 'none';
        }

        // ── Load / refresh ────────────────────────────────────────────────────
        async function loadProvider() {
            const key = await getActiveKey();
            if (!key) {
                costEl.textContent = activeProvider === 'openai' ? 'OAI: $--:--' : 'ANT: $--:--';
                statusEl.textContent = 'Status: No API key';
                showAddKeyPanel();
                return;
            }
            // Try cache first — but only use it if data is actually present.
            // If only baseline config is cached (no prior successful fetch), fall through to fetch.
            try {
                const cachedData = await invoke('get_cached_data');
                const cached = getCachedForProvider(cachedData);
                if (cached && cached.data !== null && cached.data !== undefined) {
                    const statusMsg = cached.status || 'From cache';
                    const label = cached.baseline
                        ? `${statusMsg} (baseline ${cached.baseline.amount} from ${cached.baseline.start_iso})`
                        : statusMsg;
                    updateUI(cached.data, label);
                    currentCost = cached.data;
                    return;
                }
            } catch (e) { /* fall through to fresh fetch */ }
            await fetchFreshData();
        }

        async function fetchFreshData() {
            const key = await getActiveKey();
            if (!key) return;
            currentStatus = 'Fetching...';
            updateUI(currentCost, currentStatus);
            try {
                const result = await fetchActiveProvider(key);
                if (result.success) {
                    currentCost = result.data;
                    currentStatus = result.status || 'Fetched';
                    updateUI(result.data, currentStatus);
                } else {
                    currentStatus = 'Failed: ' + result.error;
                    updateUI(currentCost, currentStatus);
                }
            } catch (e) {
                currentStatus = 'Error: ' + e;
                updateUI(currentCost, currentStatus);
            }
        }

        // ── UI helpers ────────────────────────────────────────────────────────
        function updateUI(cost, status) {
            const isBaseline = typeof status === 'string' &&
                (status.includes('With baseline') || status.toLowerCase().includes('baseline'));
            const prefix = activeProvider === 'openai' ? 'OAI' : 'ANT';

            if (cost !== null && cost !== undefined) {
                const label = isBaseline ? 'BLR' : 'MTD';
                costEl.textContent = `${prefix} ${label}: $${parseFloat(cost).toFixed(2)}`;
            } else {
                costEl.textContent = `${prefix}: $--:--`;
            }

            const autoIndicator = autoRefreshInterval ? ' (Auto: ON)' : '';
            statusEl.textContent = `Status: ${status}${autoIndicator}`;
            try { statusEl.title = `${status}${autoIndicator}`; } catch (e) {}
            currentStatus = status;
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => fetchFreshData(), 180000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
        }

        // ── Baseline modal ────────────────────────────────────────────────────
        function forceWidgetRepaint() {
            widget.style.transform = 'translateZ(0)';
            requestAnimationFrame(() => { widget.style.transform = ''; });
        }

        function hideBaselineModal() {
            baselineModal.style.display = 'none';
            baselineModal.style.visibility = 'hidden';
            baselineModal.style.pointerEvents = 'none';
            baselineModal.setAttribute('aria-hidden', 'true');
            if (baselineModalParent && baselineModal.parentElement) baselineModal.remove();
            forceWidgetRepaint();
        }

        function showBaselineModal() {
            if (baselineModalParent && !baselineModalParent.contains(baselineModal)) {
                baselineModalParent.appendChild(baselineModal);
            }
            baselineModal.style.visibility = 'visible';
            baselineModal.style.pointerEvents = 'auto';
            baselineModal.setAttribute('aria-hidden', 'false');
        }

        baselineToggleBtn.addEventListener('click', async () => {
            // Pass active provider so baseline.html knows which commands to call
            const providerParam = activeProvider === 'anthropic' ? '?provider=anthropic' : '';
            try {
                const overlayX = Math.round(window.screenX);
                const overlayY = Math.round(window.screenY);
                if (!invoke) throw new Error('invoke unavailable');
                // Set provider in app state before showing the modal so baseline.html can read it
                await invoke('set_baseline_provider', { provider: activeProvider });
                await invoke('show_baseline_modal', { x: overlayX, y: overlayY });
                return;
            } catch (err) {
                console.error('show_baseline_modal invoke failed', err);
            }

            // Fallback: in-DOM modal
            showBaselineModal();
            try {
                const cachedData = await invoke('get_cached_data');
                const cached = getCachedForProvider(cachedData);
                if (cached && cached.baseline && cached.baseline.amount) {
                    modalAmountInput.value = cached.baseline.amount;
                    if (cached.baseline.start_iso) modalDateInput.value = cached.baseline.start_iso.slice(0, 10);
                } else {
                    modalAmountInput.value = '';
                    modalDateInput.value = new Date().toISOString().slice(0, 10);
                }
            } catch (e) {
                modalAmountInput.value = '';
                modalDateInput.value = new Date().toISOString().slice(0, 10);
            }
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
            const rect = widget.getBoundingClientRect();
            baselineModal.style.position = 'fixed';
            baselineModal.style.left = rect.left + 'px';
            baselineModal.style.top = rect.top + 'px';
            baselineModal.style.width = rect.width + 'px';
            baselineModal.style.height = rect.height + 'px';
            baselineModal.style.display = 'flex';
            modalAmountInput.focus();
            modalAmountInput.select();
        });

        modalBackdrop.addEventListener('click', hideBaselineModal);
        modalCloseBtn.addEventListener('click', hideBaselineModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && baselineModal.style.display === 'flex') hideBaselineModal();
        });

        modalSaveBtn.addEventListener('click', async () => {
            const amount = modalAmountInput.value.trim();
            const date = modalDateInput.value;
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
            if (!amount || isNaN(parseFloat(amount))) {
                modalError.textContent = 'Please enter a valid baseline amount';
                modalError.style.display = 'block';
                return;
            }
            if (!date) {
                modalError.textContent = 'Please select a baseline start date';
                modalError.style.display = 'block';
                return;
            }
            const startIso = `${date}T00:00:00Z`;
            modalSaveBtn.disabled = true;
            modalSaveBtn.textContent = 'Saving...';
            try {
                const cmd = activeProvider === 'anthropic' ? 'save_anthropic_baseline_command' : 'save_baseline_command';
                await invoke(cmd, { amount, startIso });
                modalSuccess.textContent = 'Baseline saved';
                modalSuccess.style.display = 'block';
                await fetchFreshData();
                hideBaselineModal();
            } catch (err) {
                modalError.textContent = 'Failed to save baseline: ' + err;
                modalError.style.display = 'block';
            } finally {
                modalSaveBtn.disabled = false;
                modalSaveBtn.textContent = 'Save';
            }
        });

        modalClearBtn.addEventListener('click', async () => {
            modalClearBtn.disabled = true;
            modalClearBtn.textContent = 'Clearing...';
            try {
                const cmd = activeProvider === 'anthropic' ? 'clear_anthropic_baseline_command' : 'clear_baseline_command';
                await invoke(cmd);
                modalSuccess.textContent = 'Baseline cleared';
                modalSuccess.style.display = 'block';
                await fetchFreshData();
                hideBaselineModal();
            } catch (err) {
                modalError.textContent = 'Failed to clear baseline: ' + err;
                modalError.style.display = 'block';
            } finally {
                modalClearBtn.disabled = false;
                modalClearBtn.textContent = 'Clear';
            }
        });

        // ── Setup form events ─────────────────────────────────────────────────
        saveApiBtn.addEventListener('click', saveApiKey);
        apiKeyForm.addEventListener('submit', (e) => { e.preventDefault(); saveApiKey(); });

        // ── Context menu ──────────────────────────────────────────────────────
        export function hideContextMenu() {
            if (contextMenu) {
                contextMenu.style.display = 'none';
                contextMenu.style.visibility = 'hidden';
                contextMenu.style.pointerEvents = 'none';
            }
            forceWidgetRepaint();
            if (window.forceFullWindowPaintNudge) window.forceFullWindowPaintNudge();
            if (invoke) { try { invoke('hide_context_menu'); } catch (e) {} }
        }
        window.hideContextMenu = hideContextMenu;

        function showContextMenu(x, y) {
            if (!contextMenu) return;
            contextMenu.style.visibility = 'visible';
            contextMenu.style.pointerEvents = 'auto';
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.style.display = 'block';
        }

        document.addEventListener('contextmenu', async (e) => {
            if (!e.target.closest('.widget')) return;
            e.preventDefault();
            e.stopPropagation();
            const x = e.clientX, y = e.clientY;
            const menuWidth = 96, menuHeight = 64;
            const adjustedX = x + menuWidth > window.innerWidth ? window.innerWidth - menuWidth : x;
            const adjustedY = y + menuHeight > window.innerHeight ? window.innerHeight - menuHeight : y;
            const absoluteX = Math.round(window.screenX + adjustedX);
            const absoluteY = Math.round(window.screenY + adjustedY);
            try {
                if (!invoke) throw new Error('invoke unavailable');
                await invoke('show_context_menu', { x: absoluteX, y: absoluteY });
            } catch (err) {
                showContextMenu(adjustedX, adjustedY);
            }
        });

        document.addEventListener('click', (e) => {
            if (!contextMenu || !contextMenu.contains(e.target)) hideContextMenu();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideContextMenu();
        });

        if (closeAppBtn) {
            closeAppBtn.addEventListener('click', async () => {
                try { if (!invoke) throw new Error(); await invoke('quit_app'); } catch (err) {}
                hideContextMenu();
            });
        }
        if (cancelMenuBtn) {
            cancelMenuBtn.addEventListener('click', () => hideContextMenu());
        }

        // ── Drag ──────────────────────────────────────────────────────────────
        if (widget) {
            widget.addEventListener('mousedown', async (e) => {
                if (e.target.closest('button') || e.target.closest('input') || e.target.closest('#baseline-modal-panel')) return;
                if (appWindow && typeof appWindow.startDragging === 'function') {
                    try { await appWindow.startDragging(); } catch (err) {}
                }
                e.preventDefault();
            });
        }

        // ── Init ──────────────────────────────────────────────────────────────
        async function init() {
            await loadProvider();
            startAutoRefresh();
        }

        refreshBtn.addEventListener('click', () => fetchFreshData());

        window.addEventListener('beforeunload', stopAutoRefresh);

        init();
    </script>
</body>

</html>
