<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Meter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .widget {
            background: rgba(233, 233, 233, 0.5);
            border-radius: 1px;
            border: 2px solid rgba(236, 241, 241, 0.9);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-sizing: border-box;
            -webkit-app-region: no-drag; /* Allow context menu on widget */
        }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(200, 200, 200, 0.8);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            min-width: 120px;
            font-size: 12px;
            -webkit-app-region: no-drag;
        }

        .context-menu-item {
            padding: 6px 12px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            font-size: 12px;
            color: #333;
        }

        .context-menu-item:hover {
            background: rgba(100, 100, 100, 0.1);
        }

        .context-menu-item:first-child {
            border-radius: 4px 4px 0 0;
        }

        .context-menu-item:last-child {
            border-radius: 0 0 4px 4px;
        }

        #normal-display {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 20px;
            margin-bottom: 4px;
        }

        .drag-handle {
            width: 16px;
            height: 16px;
            cursor: grab;
            -webkit-app-region: drag;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .cost {
            font-size: 30px;
            color: #80d755;
            margin-bottom: 4px;
            font-weight: bold;
            text-shadow: -1px 1px 2px rgba(140, 149, 148, 0.8);
        }

        .status {
            font-size: 12px;
            color: rgba(236, 241, 241, 0.8);
            text-shadow: -1px 1px 1px rgba(115, 121, 120, 0.8);
            width: 100%;
            padding:0px 2px 0px 2px;
            border-radius: 2px;
            border: 1px solid rgba(236, 241, 241, 0.5);
            background-color: rgba(115, 121, 120, 1.0);
        }

        .refresh-button {
            background: rgb(115, 121, 120);
            color: white;
            border: none;
            padding: 0px 2px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            align-self: flex-end;
            -webkit-app-region: no-drag;
        }

        .refresh-button:hover {
            background: rgb(100, 100, 100);
        }

        .refresh-button:active {
            background: rgb(100, 100, 100);
        }

        .setup-container {
            display: none;
            flex-direction: column;
            padding: 8px;
        }

        .setup-title {
            font-size: 14px;
            font-weight: bold;
            color: rgb(80, 80, 80);
            margin-bottom: 8px;
            text-align: center;
        }

        .setup-input {
            width: 100%;
            padding: 4px;
            border: 1px solid rgb(189, 201, 200);
            border-radius: 2px;
            font-size: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.8);
            -webkit-app-region: no-drag;
        }

        .setup-button {
            background: rgb(80, 80, 80);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            align-self: center;
            -webkit-app-region: no-drag;
        }

        .setup-button:hover {
            background: rgb(100, 100, 100);
        }

        .setup-button:disabled {
            background: rgb(150, 150, 150);
            cursor: not-allowed;
        }

        .setup-error {
            font-size: 11px;
            color: rgb(200, 50, 50);
            margin-top: 4px;
            text-align: center;
        }

        .setup-success {
            font-size: 11px;
            color: rgb(50, 200, 50);
            margin-top: 4px;
            text-align: center;
        }

        /* Baseline modal backdrop and panel */
        #baseline-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            /* put the modal out of the document flow and center its contents */
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #baseline-modal-backdrop {
            /* backdrop should cover the modal container (widget area) */
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            z-index: 1;
        }

        #baseline-modal-panel {
            position: relative;
            z-index: 2;
            /* make the modal a little smaller than the normal UI and responsive */
            width: min(85%, 180px);
            max-width: 90vw;
            height: 90%;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            /* prevent the modal from being cut off on short windows */
            max-height: calc(100vh - 20px);
            overflow-y: auto;
            -webkit-app-region: no-drag;
            /* allow interacting with modal inputs */
        }
    </style>
</head>

<body>
    <div class="widget">
        <!-- <div class="header">
            <div class="drag-handle">⋮⋮</div>
        </div> -->
        <div class="content">
            <!-- Normal Display -->
            <div id="normal-display">
                <div
                    style="display:flex; flex-direction: column; justify-content:space-between; align-items:center; gap:8px;">
                    <div class="cost" id="cost">MTD: $12.34</div>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <button class="refresh-button" id="refresh-btn">Refresh</button>
                        <button class="refresh-button" id="baseline-toggle-btn">Baseline</button>
                    </div>
                    <div class="status" id="status">Status: Ready</div>
                </div>


            </div>

            <!-- Setup Display -->
            <div class="setup-container" id="setup-container">
                <div class="setup-title">Setup Required</div>
                <form id="api-key-form" onsubmit="return false;">
                    <input type="text" name="username" autocomplete="username" style="display: none;">
                    <input type="password" class="setup-input" id="api-key-input" placeholder="Enter OpenAI API Key"
                        autocomplete="new-password">
                    <button type="submit" class="setup-button" id="save-api-btn">Save & Start</button>
                </form>
                <div class="setup-error" id="setup-error" style="display: none;"></div>
                <div class="setup-success" id="setup-success" style="display: none;"></div>
            </div>
        </div>
    </div>


    <!-- Baseline Modal -->
    <div id="baseline-modal" style="display:none;" aria-hidden="true">
        <div id="baseline-modal-backdrop"></div>
        <div id="baseline-modal-panel" role="dialog" aria-modal="true" aria-labelledby="baseline-modal-title">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <div id="baseline-modal-title" style="font-weight:600;">Set Baseline Credit</div>
                <button id="baseline-modal-close"
                    style="background:transparent;border:none;font-size:16px;cursor:pointer;">✕</button>
            </div>
            <div style="display:flex; flex-direction:column; gap:6px;">
                <input type="number" id="modal-baseline-amount" class="setup-input"
                    placeholder="Baseline amount (e.g. 5.10)" step="0.01" min="0">
                <input type="date" id="modal-baseline-date" class="setup-input">
                <div style="display:flex; gap:6px;">
                    <button class="setup-button" id="modal-save-baseline-btn">Save</button>
                    <button class="setup-button" id="modal-clear-baseline-btn">Clear</button>
                </div>
                <div class="setup-error" id="modal-baseline-error" style="display:none"></div>
                <div class="setup-success" id="modal-baseline-success" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu">
        <button class="context-menu-item" id="close-app">Close</button>
        <button class="context-menu-item" id="cancel-menu">Cancel</button>
    </div>

    <script type="module">
        import { forceMousemoveRepaint, forceElementMousemove, forcePointerRepaint,
            forceCssRepaint, toggleWindowOpacityRepaint, forceFullWindowPaintNudge
         } from './ui/contextMenu.js';
        window.forceMousemoveRepaint = forceMousemoveRepaint;
        window.forceElementMousemove = forceElementMousemove;
        window.forcePointerRepaint = forcePointerRepaint;
        window.forceCssRepaint = forceCssRepaint;
        window.toggleWindowOpacityRepaint = toggleWindowOpacityRepaint;
        window.forceFullWindowPaintNudge = forceFullWindowPaintNudge;
        
        const invoke = (window.__TAURI__?.core && typeof window.__TAURI__.core.invoke === 'function')
            ? window.__TAURI__.core.invoke
            : (window.__TAURI__?.tauri && typeof window.__TAURI__.tauri.invoke === 'function')
              ? window.__TAURI__.tauri.invoke
              : (typeof window.__TAURI__?.invoke === 'function')
                ? window.__TAURI__.invoke
                : null;
        const appWindow = window.__TAURI__?.window?.getCurrentWindow
            ? window.__TAURI__.window.getCurrentWindow()
            : null;

        // State
        let currentCost = null;
        let currentStatus = 'Loading...';
        let autoRefreshInterval = null;

        // Elements
        const costEl = document.getElementById('cost');
        const statusEl = document.getElementById('status');
        const refreshBtn = document.getElementById('refresh-btn');
        const baselineToggleBtn = document.getElementById('baseline-toggle-btn');
        const baselineModal = document.getElementById('baseline-modal');
        const modalBackdrop = document.getElementById('baseline-modal-backdrop');
        const modalCloseBtn = document.getElementById('baseline-modal-close');
        const modalAmountInput = document.getElementById('modal-baseline-amount');
        const modalDateInput = document.getElementById('modal-baseline-date');
        const modalSaveBtn = document.getElementById('modal-save-baseline-btn');
        const modalClearBtn = document.getElementById('modal-clear-baseline-btn');
        const modalError = document.getElementById('modal-baseline-error');
        const modalSuccess = document.getElementById('modal-baseline-success');
        const normalDisplay = document.getElementById('normal-display');
        const setupContainer = document.getElementById('setup-container');
        const apiKeyForm = document.getElementById('api-key-form');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveApiBtn = document.getElementById('save-api-btn');
        const setupError = document.getElementById('setup-error');
        const setupSuccess = document.getElementById('setup-success');

        // Context menu elements
        const contextMenu = document.getElementById('context-menu');
        const closeAppBtn = document.getElementById('close-app');
        const cancelMenuBtn = document.getElementById('cancel-menu');

        const baselineModalParent = baselineModal.parentElement;
        const contextMenuParent = contextMenu.parentElement;

        function forceWidgetRepaint() {
            // Workaround for Linux transparent window repaint artifacts (stale pixels)
            // by forcing a one-frame compositing change.
            widget.style.transform = 'translateZ(0)';
            requestAnimationFrame(() => {
                widget.style.transform = '';
            });
        }

        function hideBaselineModal() {
            baselineModal.style.display = 'none';
            baselineModal.style.position = '';
            baselineModal.style.left = '';
            baselineModal.style.top = '';
            baselineModal.style.width = '';
            baselineModal.style.height = '';
            baselineModal.style.visibility = 'hidden';
            baselineModal.style.pointerEvents = 'none';
            baselineModal.setAttribute('aria-hidden', 'true');
            if (baselineModalParent && baselineModal.parentElement) {
                baselineModal.remove();
            }
            forceWidgetRepaint();
        }

        function showBaselineModal() {
            if (baselineModalParent && !baselineModalParent.contains(baselineModal)) {
                baselineModalParent.appendChild(baselineModal);
            }
            baselineModal.style.visibility = 'visible';
            baselineModal.style.pointerEvents = 'auto';
            baselineModal.setAttribute('aria-hidden', 'false');
        }

        export function hideContextMenu() {
            console.log('hideContextMenu called');
            // hide any in-DOM menu if present
            try {
              contextMenu.style.display = 'none';
              contextMenu.style.visibility = 'hidden';
              contextMenu.style.pointerEvents = 'none';
              contextMenu.style.left = '';
              contextMenu.style.top = '';
              if (contextMenuParent && contextMenu.parentElement) {
                contextMenu.remove();
              }
            } catch (e) {
              // ignore if DOM not present in this window
            }
            forceWidgetRepaint();
            if (window.forceFullWindowPaintNudge) window.forceFullWindowPaintNudge();
            // Also tell the native overlay (if any) to hide
            try { invoke('hide_context_menu'); } catch (e) { /* ignore */ }
        }
        // attach hideContextMenu so non-module code can call it
        window.hideContextMenu = hideContextMenu;

        function showContextMenu() {
            console.log('showContextMenu() called');
            if (contextMenuParent && !contextMenuParent.contains(contextMenu)) {
                contextMenuParent.appendChild(contextMenu);
                console.log('contextMenu appended to DOM');
            }
            contextMenu.style.visibility = 'visible';
            contextMenu.style.pointerEvents = 'auto';
            
            // Re-attach event listeners each time menu is shown
            const closeAppBtn = document.getElementById('close-app');
            const cancelMenuBtn = document.getElementById('cancel-menu');
            
            console.log('closeAppBtn element:', closeAppBtn);
            console.log('closeAppBtn onclick:', closeAppBtn?.onclick);
            
            if (closeAppBtn) {
                closeAppBtn.addEventListener('click', async () => {
                    console.log('Close button clicked - about to call quit_app');
                    alert('Close button clicked - about to call quit_app');
                    try {
                        if (!invoke) throw new Error('invoke unavailable');
                        console.log('invoke available, calling quit_app...');
                        await invoke('quit_app');
                    } catch (err) {
                        console.error('Failed to quit app:', err);
                        alert('Failed to quit app: ' + err);
                    }
                    hideContextMenu();
                });
            } else {
                console.error('closeAppBtn not found!');
            }

            if (cancelMenuBtn) {
                cancelMenuBtn.addEventListener('click', () => {
                    hideContextMenu();
                });
            } else {
                console.error('cancelMenuBtn not found!');
            }
        }

        // Initialize
        async function init() {
            console.log('init() called');
            try {
                // Check for saved API key
                const apiKeyResult = await invoke('get_api_key');
                console.log('apiKeyResult:', apiKeyResult);

                if (apiKeyResult) {
                    // Load cached data
                    const cachedData = await invoke('get_cached_data');
                    console.log('cachedData:', cachedData);
                    if (cachedData) {
                        // If cachedData includes baseline metadata, show it in status
                        const statusMsg = cachedData.status || 'From cache';
                        if (cachedData.baseline) {
                            const b = cachedData.baseline;
                            updateUI(cachedData.data, `${statusMsg} (baseline ${b.amount} from ${b.start_iso})`);
                        } else {
                            updateUI(cachedData.data, statusMsg);
                        }
                        currentCost = cachedData.data;
                    } else {
                        // Fetch fresh data
                        console.log('No cache, fetching fresh data');
                        await fetchFreshData();
                    }
                    // Start auto-refresh after successful initialization
                    startAutoRefresh();
                    updateUI(currentCost, currentStatus);
                } else {
                    // Show setup UI
                    console.log('No API key found');
                    showSetupUI();
                }
            } catch (error) {
                console.error('Init error:', error);
                currentStatus = 'Error: ' + error;
                updateUI(null, currentStatus);
            }
        }

        function updateUI(cost, status) {
            // If the status indicates a baseline response, label differently
            // Treat both explicit 'With baseline' responses and cached messages that mention 'baseline'
            const isBaseline = typeof status === 'string' && (status.includes('With baseline') || status.toLowerCase().includes('baseline'));

            if (cost !== null) {
                if (isBaseline) {
                    costEl.textContent = `BLR: $${parseFloat(cost).toFixed(2)}`;
                } else {
                    costEl.textContent = `MTD: $${parseFloat(cost).toFixed(2)}`;
                }
            } else {
                costEl.textContent = isBaseline ? 'BLR: --' : 'MTD: --';
            }

            // Add auto-refresh indicator to status
            const autoRefreshIndicator = autoRefreshInterval ? ' (Auto: ON)' : '';
            statusEl.textContent = `Status: ${status}${autoRefreshIndicator}`;
            currentStatus = status;
        }


        function startAutoRefresh() {
            // Clear any existing interval
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }

            // Set up auto-refresh every 3 minutes (180,000 ms)
            autoRefreshInterval = setInterval(async () => {
                console.log('Auto-refresh triggered');
                await fetchFreshData();
            }, 180000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        function showSetupUI() {
            normalDisplay.style.display = 'none';
            setupContainer.style.display = 'flex';
            setupError.style.display = 'none';
            setupSuccess.style.display = 'none';
            apiKeyInput.value = '';
            apiKeyInput.focus();
        }

        function showNormalUI() {
            normalDisplay.style.display = 'flex';
            setupContainer.style.display = 'none';
        }

        function showSetupError(message) {
            setupError.textContent = message;
            setupError.style.display = 'block';
            setupSuccess.style.display = 'none';
        }

        function showSetupSuccess(message) {
            setupSuccess.textContent = message;
            setupSuccess.style.display = 'block';
            setupError.style.display = 'none';
        }

        async function saveApiKey() {
            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                showSetupError('Please enter an API key');
                return;
            }

            saveApiBtn.disabled = true;
            saveApiBtn.textContent = 'Validating...';

            try {
                // Validate the API key first
                const validation = await invoke('validate_api_key', { apiKey });

                if (validation.success) {
                    // Save the API key
                    await invoke('save_api_key_command', { apiKey });
                    showSetupSuccess('API key saved successfully!');

                    // Wait a moment then switch to normal UI
                    setTimeout(async () => {
                        showNormalUI();
                        await init(); // Re-initialize with the new API key
                    }, 1000);
                } else {
                    showSetupError('Invalid API key: ' + validation.error);
                }
            } catch (error) {
                console.error('Save API key error:', error);
                showSetupError('Error saving API key: ' + error);
            } finally {
                saveApiBtn.disabled = false;
                saveApiBtn.textContent = 'Save & Start';
            }
        }

        async function fetchFreshData() {
            console.log('fetchFreshData called');
            try {
                currentStatus = 'Fetching...';
                updateUI(currentCost, currentStatus);

                const result = await invoke('fetch_month_to_date', { apiKey: await invoke('get_api_key') });
                console.log('fetch_month_to_date result:', result);

                if (result.success) {
                    currentCost = result.data;
                    // Use returned status if provided to determine labeling
                    const respStatus = result.status || 'Fetched';
                    currentStatus = respStatus;
                    updateUI(result.data, respStatus);
                } else {
                    currentStatus = 'Failed: ' + result.error;
                    updateUI(currentCost, currentStatus);
                }
            } catch (error) {
                console.error('fetchFreshData error:', error);
                currentStatus = 'Error: ' + error;
                updateUI(currentCost, currentStatus);
            }
        }

        // Event listeners
        refreshBtn.addEventListener('click', () => {
            fetchFreshData();
        });

        // Baseline UI handlers (modal)
        baselineToggleBtn.addEventListener('click', async () => {
            // Prefer showing a native overlay window (more robust on Linux transparency/compositor)
            try {
                const overlayX = Math.round(window.screenX);
                const overlayY = Math.round(window.screenY);
                if (!invoke) throw new Error('invoke unavailable');
                await invoke('show_baseline_modal', { x: overlayX, y: overlayY });
                return;
            } catch (err) {
                console.error('show_baseline_modal invoke failed', err);
                // fallback to in-DOM modal below
            }

            // Fallback: show the in-DOM modal if native overlay not available
            showBaselineModal();
            try {
                const cached = await invoke('get_cached_data');
                if (cached && cached.baseline && cached.baseline.amount) {
                    modalAmountInput.value = cached.baseline.amount;
                    if (cached.baseline.start_iso) {
                        modalDateInput.value = cached.baseline.start_iso.slice(0, 10);
                    }
                } else {
                    modalAmountInput.value = '';
                    modalDateInput.value = new Date().toISOString().slice(0, 10);
                }
            } catch (e) {
                modalAmountInput.value = '';
                modalDateInput.value = new Date().toISOString().slice(0, 10);
            }
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
            // limit modal to the widget area so backdrop/panel don't enlarge the window
            const rect = widget.getBoundingClientRect();
            baselineModal.style.position = 'fixed';
            baselineModal.style.left = rect.left + 'px';
            baselineModal.style.top = rect.top + 'px';
            baselineModal.style.width = rect.width + 'px';
            baselineModal.style.height = rect.height + 'px';
            baselineModal.style.display = 'flex';
            modalAmountInput.focus();
            modalAmountInput.select();
        });

        // close handlers
        modalBackdrop.addEventListener('click', () => {
            hideBaselineModal();
        });
        modalCloseBtn.addEventListener('click', () => {
            hideBaselineModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && baselineModal.style.display === 'flex') {
                hideBaselineModal();
            }
        });

        modalSaveBtn.addEventListener('click', async () => {
            const amount = modalAmountInput.value.trim();
            const date = modalDateInput.value;
            modalError.style.display = 'none';
            modalSuccess.style.display = 'none';
            if (!amount || isNaN(parseFloat(amount))) {
                modalError.textContent = 'Please enter a valid baseline amount';
                modalError.style.display = 'block';
                return;
            }
            if (!date) {
                modalError.textContent = 'Please select a baseline start date';
                modalError.style.display = 'block';
                return;
            }
            const startIso = `${date}T00:00:00Z`;
            modalSaveBtn.disabled = true;
            modalSaveBtn.textContent = 'Saving...';
            try {
                await invoke('save_baseline_command', { amount, startIso });
                modalSuccess.textContent = 'Baseline saved';
                modalSuccess.style.display = 'block';
                await fetchFreshData();
                hideBaselineModal();
            } catch (err) {
                modalError.textContent = 'Failed to save baseline: ' + err;
                modalError.style.display = 'block';
            } finally {
                modalSaveBtn.disabled = false;
                modalSaveBtn.textContent = 'Save';
            }
        });

        modalClearBtn.addEventListener('click', async () => {
            modalClearBtn.disabled = true;
            modalClearBtn.textContent = 'Clearing...';
            try {
                await invoke('clear_baseline_command');
                modalSuccess.textContent = 'Baseline cleared';
                modalSuccess.style.display = 'block';
                await fetchFreshData();
                hideBaselineModal();
            } catch (err) {
                modalError.textContent = 'Failed to clear baseline: ' + err;
                modalError.style.display = 'block';
            } finally {
                modalClearBtn.disabled = false;
                modalClearBtn.textContent = 'Clear';
            }
        });

        // Setup UI event listeners
        saveApiBtn.addEventListener('click', saveApiKey);
        apiKeyForm.addEventListener('submit', (e) => {
            e.preventDefault();
            saveApiKey();
        });

        // Drag functionality
        const widget = document.querySelector('.widget');
        console.log('Widget element found:', widget);
        
        if (widget) {
            console.log('Adding contextmenu event listener to widget');
            
            // Add mousedown event listener for drag functionality
            widget.addEventListener('mousedown', async (e) => {
                // Don't drag if clicking on interactive elements
                if (e.target.closest('button') || e.target.closest('input') || e.target.closest('#baseline-modal-panel')) {
                    return;
                }

                // Prefer native window-manager drag (fixes jitter/lag on Linux)
                if (appWindow && typeof appWindow.startDragging === 'function') {
                    try {
                        await appWindow.startDragging();
                    } catch (err) {
                        console.error('startDragging failed:', err);
                    }
                }

                e.preventDefault();
            });
        }
        
        // Try attaching contextmenu listener to document instead
        console.log('Adding contextmenu event listener to document');
        document.addEventListener('contextmenu', async (e) => {
            console.log('document contextmenu event fired! target:', e.target);
            
            // Only handle if clicking on our widget
            if (!e.target.closest('.widget')) {
                console.log('Click not on widget, ignoring');
                return;
            }
            
            console.log('contextmenu event fired on widget!');
            e.preventDefault();
            e.stopPropagation(); // Prevent Windows default menu
            
            // Position relative to widget/window
            const x = e.clientX;
            const y = e.clientY;

            // Make sure menu doesn't go off screen (use same menu dims as overlay)
            const menuWidth = 96;
            const menuHeight = 64;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            const adjustedX = x + menuWidth > screenWidth ? screenWidth - menuWidth : x;
            const adjustedY = y + menuHeight > screenHeight ? screenHeight - menuHeight : y;

            // Convert to screen coordinates so the native overlay window can be positioned correctly
            const absoluteX = Math.round(window.screenX + adjustedX);
            const absoluteY = Math.round(window.screenY + adjustedY);

            // Show native overlay via Tauri command
            try {
                if (!invoke) throw new Error('invoke unavailable');
                await invoke('show_context_menu', { x: absoluteX, y: absoluteY });
            } catch (err) {
                console.error('show_context_menu invoke failed', err);
                // Fallback to in-DOM menu if native overlay unavailable
                showContextMenu();
                contextMenu.style.left = adjustedX + 'px';
                contextMenu.style.top = adjustedY + 'px';
                contextMenu.style.display = 'block';
            }
        });

        // Close context menu when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) {
                hideContextMenu();
            }
        });

        // Close context menu on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideContextMenu();
            }
        });

        // Close app handler
        closeAppBtn.addEventListener('click', async () => {
            console.log('Close button clicked - about to call quit_app');
            alert('Close button clicked - about to call quit_app');
            try {
                if (!invoke) throw new Error('invoke unavailable');
                console.log('invoke available, calling quit_app...');
                await invoke('quit_app');
            } catch (err) {
                console.error('Failed to quit app:', err);
                alert('Failed to quit app: ' + err);
            }
            hideContextMenu();
        });

        // Cancel menu handler
        cancelMenuBtn.addEventListener('click', () => {
            hideContextMenu();
        });

        // Initialize app
        console.log('Script loaded, calling init()');

        // Ensure normal display is shown initially
        showNormalUI();

        init();

        // Cleanup auto-refresh when page unloads
        window.addEventListener('beforeunload', () => {
            stopAutoRefresh();
        });
    </script>
</body>

</html>
