<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Baseline</title>
<style>
  html, body {
    display: flex;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: inherit;
    align-items: center;
    justify-content: center;
    content-visibility: auto;
    -webkit-user-select: none;
  }

  .panel {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    align-items: stretch;
    background: rgba(255,255,255,1.0);
    padding: 8px;
    border-radius: 1px;
    border-width: 1px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    box-sizing: border-box;
  }

  .row{display:flex;gap:6px;margin-top:6px}
  .input{
    width:100%;
    font-size: 12px;
    padding:2px;
    border:1px solid #cfcfcf;
    border-radius:2px}
  .btn{padding:1px 3px;
    border:none;
    border-radius:2px;
    background:rgb(115, 121, 120);
    color:#fff;
    font-size: 12px;
    cursor:pointer}
  .btn:disabled{opacity:0.6}
  .provider-label{font-size:10px;color:#888;margin-left:4px}
</style>
</head>
<body>
  <div class="panel" role="dialog" aria-modal="true">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-weight:600">Set Baseline Credit <span id="provider-label" class="provider-label"></span></div>
      <button id="btn-cancel" style="background:transparent;border:none;font-size:16px;cursor:pointer">✕</button>
    </div>
    <div class="row">
      <input id="amount" class="input" type="number" step="0.01" min="0" placeholder="Baseline amount (e.g. 5.10)">
    </div>
    <div class="row">
      <input id="date" class="input" type="date">
    </div>
    <div class="row">
      <button id="btn-save" class="btn">Save</button>
      <button id="btn-clear" class="btn">Clear</button>
    </div>
    <div id="msg" style="margin-top:8px;font-size:13px;color:#b33;display:none"></div>
  </div>
<script>
  console.log('baseline overlay loaded');

  function getInvoke() {
    try {
      if (window.__TAURI__) {
        if (window.__TAURI__.core && typeof window.__TAURI__.core.invoke === 'function') return window.__TAURI__.core.invoke;
        if (window.__TAURI__.tauri && typeof window.__TAURI__.tauri.invoke === 'function') return window.__TAURI__.tauri.invoke;
        if (typeof window.__TAURI__.invoke === 'function') return window.__TAURI__.invoke;
      }
    } catch (e) { console.warn('getInvoke failed', e); }
    return null;
  }

  const inv = getInvoke();

  // Read active provider from app state set by index.html before showing this window
  let provider = 'openai';
  let saveCmd = 'save_baseline_command';
  let clearCmd = 'clear_baseline_command';

  async function initProvider() {
    try {
      provider = (await inv('get_baseline_provider')) || 'openai';
    } catch (e) { provider = 'openai'; }
    saveCmd = provider === 'anthropic' ? 'save_anthropic_baseline_command' : 'save_baseline_command';
    clearCmd = provider === 'anthropic' ? 'clear_anthropic_baseline_command' : 'clear_baseline_command';
    document.getElementById('provider-label').textContent = provider === 'anthropic' ? '(Anthropic)' : '(OpenAI)';
  }

  const btnCancel = document.getElementById('btn-cancel');
  const btnSave = document.getElementById('btn-save');
  const btnClear = document.getElementById('btn-clear');
  const amountIn = document.getElementById('amount');
  const dateIn = document.getElementById('date');
  const msg = document.getElementById('msg');

  async function tryInvoke(cmd, args) {
    if (!inv) { console.error('invoke not available'); return null; }
    try { return await inv(cmd, args); } catch (e) { console.error('invoke error', cmd, e); throw e; }
  }

  // Called every time the window becomes visible (focus event covers show/re-show)
  async function onShow() {
    await initProvider();
    try {
      const cachedData = await tryInvoke('get_cached_data');
      const cached = cachedData
        ? (provider === 'anthropic' ? cachedData.anthropic : cachedData.openai)
        : null;
      if (cached && cached.baseline && cached.baseline.amount) {
        amountIn.value = cached.baseline.amount;
        if (cached.baseline.start_iso) dateIn.value = cached.baseline.start_iso.slice(0, 10);
      } else {
        amountIn.value = '';
        dateIn.value = new Date().toISOString().slice(0, 10);
      }
    } catch (e) {
      amountIn.value = '';
      dateIn.value = new Date().toISOString().slice(0, 10);
    }
    try { amountIn.focus(); amountIn.select(); } catch (e) {}
  }

  // Run on first load and on every subsequent focus (window shown again)
  window.addEventListener('focus', onShow);
  window.addEventListener('load', onShow);

  btnCancel.addEventListener('click', async () => {
    try { await tryInvoke('hide_baseline_modal'); } catch (e) {}
  });

  btnSave.addEventListener('click', async () => {
    msg.style.display = 'none';
    const amount = (amountIn.value || '').trim();
    const date = (dateIn.value || '');
    if (!amount || isNaN(parseFloat(amount))) { msg.textContent = 'Please enter a valid amount'; msg.style.display = 'block'; return; }
    if (!date) { msg.textContent = 'Please choose a date'; msg.style.display = 'block'; return; }
    btnSave.disabled = true; btnSave.textContent = 'Saving...';
    try {
      const startIso = `${date}T00:00:00Z`;
      await tryInvoke(saveCmd, { amount, startIso });
      await tryInvoke('hide_baseline_modal');
    } catch (e) {
      msg.textContent = 'Failed to save baseline: ' + e; msg.style.display = 'block';
    } finally {
      btnSave.disabled = false; btnSave.textContent = 'Save';
    }
  });

  btnClear.addEventListener('click', async () => {
    btnClear.disabled = true; btnClear.textContent = 'Clearing...'; msg.style.display = 'none';
    try {
      await tryInvoke(clearCmd);
      await tryInvoke('hide_baseline_modal');
    } catch (e) {
      msg.textContent = 'Failed to clear baseline: ' + e; msg.style.display = 'block';
    } finally {
      btnClear.disabled = false; btnClear.textContent = 'Clear';
    }
  });

  document.addEventListener('click', async (e) => {
    const panel = document.querySelector('.panel');
    if (!panel.contains(e.target)) {
      try { await tryInvoke('hide_baseline_modal'); } catch (e) {}
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { try { inv && inv('hide_baseline_modal'); } catch (e) {} }
  });

</script>
</body>
</html>
